server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Reverse-proxy API calls to the backend container. "backend" is the
    # service name in docker-compose.yml — Docker's internal DNS resolves it.
    # apiClient.ts's default baseURL is the relative "/api/v1", so this
    # keeps dev (Vite proxy) and prod (this nginx proxy) working identically
    # without any frontend code changes.
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache hashed static assets aggressively; index.html is never hashed
    # so it's excluded (must always revalidate for SPA routing to work).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: any unmatched path (e.g. /genres/Comedy on a hard
    # refresh) serves index.html so React Router can take over client-side.
    location / {
        try_files $uri /index.html;
    }
}
